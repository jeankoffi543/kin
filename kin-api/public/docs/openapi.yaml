                  description: 'Must be at least 10 characters. Must not be greater than 4096 characters.'
                  example: 'n'
                  nullable: true
                image:
                  type: string
                  format: binary
                  description: 'Must be an image. Must not be greater than 5120 kilobytes.'
              required:
