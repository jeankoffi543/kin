openapi: 3.0.3
info:
  title: 'Laravel API Documentation'
  description: 'Kin Parental Control Platform REST API. Three guard-separated client surfaces: Parent app (Bearer Sanctum), Admin backoffice (Bearer admin-sanctum), and Child device (X-Device-UUID header).'
  version: 1.0.0
servers:
  - url: 'http://localhost:8000'
tags:
  - name: 'User: Authentication'
    description: "\nEndpoints for parent / user account lifecycle (register, login, logout, profile).\nRoutes under `auth:admin-sanctum` share this controller for CRUD; those are tagged separately via `@group` on each method."
  - name: 'User: Device Management'
    description: "\nParent device lifecycle (register, list, show, delete, status, commands).\nTelemetry feed endpoints are tagged `@group User: Telemetry Feeds` or `@group Admin: Telemetry Feeds`."
  - name: 'User: Conversations'
    description: ''
  - name: 'User: Notifications'
    description: ''
  - name: 'Admin: Authentication'
    description: "\nAdmin backoffice login/logout and admin account CRUD."
  - name: 'Admin: Admin Management'
    description: ''
  - name: 'Admin: User Management'
    description: ''
  - name: 'Admin: Titles'
    description: "\nManage support ticket category titles (admin-only CRUD)."
  - name: 'Admin: Notifications'
    description: "\nBroadcast push notifications to all parents or specific users.\nDevice and user read-only endpoints are tagged in each method."
  - name: 'Admin: Conversations'
    description: "\nSupport ticket conversation management. Admin methods are in this group;\nuser-facing methods are tagged `@group User: Conversations` individually."
  - name: 'Device: Sync & Telemetry'
    description: "\nDedicated ingestion and synchronization controller for mobile child devices.\nRestrictions and command endpoints are tagged `@group Device: Restrictions & Commands`.\n\nAll methods are encapsulated in $this->invokeWithCatching(function () { ... })\nto respect the strict \"zero logic in the controller\" architectural contract."
  - name: 'Device: Notifications'
    description: ''
  - name: 'Device: Restrictions & Commands'
    description: ''
  - name: Miscellaneous
    description: ''
components:
  securitySchemes:
    default:
      type: http
      scheme: bearer
      description: 'Get a token via `POST /api/user/login` (parent), `POST /api/admin/login` (admin), or pass `X-Device-UUID` header (child device).'
security:
  -
    default: []
paths:
  /api/user/register:
    post:
      summary: ''
      operationId: postApiUserRegister
      description: ''
      parameters: []
      responses: {}
      tags:
        - 'User: Authentication'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: 'Must not be greater than 255 characters.'
                  example: b
                email:
                  type: string
                  description: 'Must be a valid email address.'
                  example: zbailey@example.net
                password:
                  type: string
                  description: 'Must be at least 8 characters.'
                  example: '-0pBNvYgxw'
              required:
                - name
                - email
                - password
  /api/user/login:
